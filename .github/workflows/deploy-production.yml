name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build backend
        working-directory: backend
        run: |
          dotnet restore
          dotnet build -c Release /p:UseAppHost=false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pinecos-frontend/package-lock.json

      - name: Build frontend
        working-directory: pinecos-frontend
        run: |
          npm ci
          npm run lint
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${PROD_HOST:?Secret PROD_HOST no configurado}"
          : "${PROD_SSH_KEY:?Secret PROD_SSH_KEY no configurado}"

          PROD_PORT="${PROD_PORT:-22}"
          PROD_USER="${PROD_USER:-root}"

          mkdir -p ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -p "$PROD_PORT" -H "$PROD_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/prod_key -p "$PROD_PORT" "$PROD_USER@$PROD_HOST" 'bash -s' <<'EOF'
            set -euo pipefail

            # Primer paso: asegurar que el repo del servidor tenga el commit nuevo
            su - pinecos -c "cd /home/pinecos/app && git fetch --prune origin && git checkout main && git pull --ff-only origin main"

            # Deploy productivo
            chmod +x /home/pinecos/app/ops/deploy_prod.sh
            SKIP_GIT_PULL=1 TARGET_BRANCH=main /home/pinecos/app/ops/deploy_prod.sh
          EOF
