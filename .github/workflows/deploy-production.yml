name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build backend
        working-directory: backend
        run: |
          dotnet restore
          dotnet build -c Release /p:UseAppHost=false

      - name: Run backend tests (if present)
        run: |
          set -euo pipefail
          if ls **/*Tests*.csproj >/dev/null 2>&1 || ls **/*.Tests.csproj >/dev/null 2>&1; then
            dotnet test -c Release --no-build --verbosity minimal
          else
            echo "No se encontraron proyectos de prueba .NET, se omite dotnet test."
          fi

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: pinecos-frontend/package-lock.json

      - name: Build frontend
        working-directory: pinecos-frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Run frontend smoke E2E (optional)
        working-directory: pinecos-frontend
        env:
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_API_URL: ${{ secrets.E2E_API_URL }}
          E2E_FRONTEND_URL: ${{ secrets.E2E_FRONTEND_URL }}
        run: |
          if [ -z "$E2E_ADMIN_PASS" ]; then
            echo "E2E_ADMIN_PASS no configurado, se omiten pruebas E2E."
            exit 0
          fi
          npx playwright install --with-deps chromium
          npm run e2e:smoke

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Setup SSH
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_KNOWN_HOST: ${{ secrets.PROD_KNOWN_HOST }}
        run: |
          set -euo pipefail
          : "${PROD_SSH_KEY:?Secret PROD_SSH_KEY no configurado en GitHub Secrets}"
          mkdir -p ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          if [ -n "$PROD_KNOWN_HOST" ]; then
            printf '%s\n' "$PROD_KNOWN_HOST" >> ~/.ssh/known_hosts
          else
            echo "PROD_KNOWN_HOST no configurado — usando StrictHostKeyChecking=accept-new."
          fi

      - name: Deploy via SSH
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_KNOWN_HOST: ${{ secrets.PROD_KNOWN_HOST }}
        run: |
          set -euo pipefail
          : "${PROD_HOST:?Secret PROD_HOST no configurado en GitHub Secrets}"
          PROD_PORT="${PROD_PORT:-22}"
          PROD_USER="${PROD_USER:-root}"
          SSH_OPTS="-i ~/.ssh/prod_key -p $PROD_PORT"
          [ -z "${PROD_KNOWN_HOST:-}" ] && SSH_OPTS="$SSH_OPTS -o StrictHostKeyChecking=accept-new"

          # shellcheck disable=SC2086
          ssh $SSH_OPTS "$PROD_USER@$PROD_HOST" 'bash -s' <<'ENDSSH'
            set -euo pipefail
            su - pinecos -c "
              cd /home/pinecos/app
              git fetch --prune origin
              git checkout main
              git reset --hard origin/main
              echo Commit: \$(git log -1 --oneline)
            "
            chmod +x /home/pinecos/app/ops/deploy_prod.sh
            SKIP_GIT_PULL=1 TARGET_BRANCH=main /home/pinecos/app/ops/deploy_prod.sh
          ENDSSH
